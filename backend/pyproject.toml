[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--cov=app --cov-report=term-missing --cov-report=xml --cov-report=html"

[tool.coverage.run]
source = ["app"]
omit = ["tests/*", "app/__init__.py"]
# Store repo-root-relative paths so SonarQube (run in a Linux container) can
# resolve files regardless of the absolute Windows path used at test time.
relative_files = true

[tool.coverage.report]
show_missing = true
