sonar.projectKey=droussi
sonar.projectName=Droussi Exam Generator

# Source code (the two apps). Tests and generated/vendored dirs are excluded below.
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.exclusions=**/node_modules/**,**/.venv/**,**/dist/**,**/__pycache__/**,**/*.test.ts,**/*.test.tsx

# Language settings
sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# Coverage reports produced by pytest-cov (backend) and Vitest v8 (frontend)
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
